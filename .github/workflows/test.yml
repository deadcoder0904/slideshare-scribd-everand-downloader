name: Nightly Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *" # Runs at 02:00 UTC every day

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lockb') }}

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Clean output folder
        run: rm -rf ./dist

      # --- Test scribd.com ---
      - name: Download scribd document
        run: bun start "https://www.scribd.com/document/679737266/tiktok-crash-course"

      - name: Verify scribd file exists
        run: |
          COUNT=$(find ./dist -name '*.pdf' | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "Download failed: no PDF found!"
            exit 1
          fi
          echo "Downloaded successfully:"
          ls -la ./dist/*.pdf

      # --- Test slideshare.net ---
      - name: Download slideshare presentation
        run: bun start "https://www.slideshare.net/slideshow/tiktok-douyin-playbook-by-uplab/132915122"

      - name: Verify slideshare download
        run: |
          COUNT=$(find ./dist -name '*.pdf' | wc -l)
          if [ "$COUNT" -lt 2 ]; then
            echo "Download failed: expected 2 PDFs, found $COUNT"
            exit 1
          fi
          echo "Downloaded successfully:"
          ls -la ./dist/*.pdf

name: Nightly Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *" # Runs at 02:00 UTC every day

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Clean output folder
        run: rm -rf ./dist

      # --- Test scribd.com ---
      - name: Download scribd document
        run: bun start "https://www.scribd.com/doc/8286154/Free-eBook-Retire-Happy-Wild-and-Free"

      - name: Verify scribd file exists
        run: |
          if [ ! -f "./dist/Free-eBook-Retire-Happy-Wild-and-Free.pdf" ]; then
            echo "Download failed: scribd file not found!"
            exit 1
          else
            echo "Downloaded successfully: scribd file exists."
          fi

      # --- Test slideshare.net ---
      - name: Download slideshare presentation
        run: bun start "https://www.slideshare.net/slideshow/everything-you-need-to-know-about-chatgpt-8ba3/266783915"

      - name: Verify slideshare download
        run: |
          FILE="./dist/everything-you-need-to-know-about-chatgpt-8ba3.pdf"
          if [ ! -f "$FILE" ]; then
            echo "Download failed: slides not found!"
            exit 1
          else
            echo "Downloaded successfully: slides exist."
          fi
